# ============================================================
# Nginx config for ChatApp on Ubuntu VPS
# Place at: /etc/nginx/sites-available/chatapp
# Then: sudo ln -s /etc/nginx/sites-available/chatapp /etc/nginx/sites-enabled/
# ============================================================

upstream chatapp_backend {
    # When PM2 runs in cluster mode, all processes share port 3000
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # ── TLS (generated by Certbot) ────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── Upload size limit (match MAX_FILE_SIZE_MB) ────────────
    client_max_body_size 55M;

    # ── Static uploads ────────────────────────────────────────
    location /uploads/ {
        alias /var/www/chatapp/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # Prevent PHP/script execution inside uploads
        location ~* \.(php|pl|py|sh|cgi)$ { deny all; }
    }

    # ── Socket.io (WebSocket upgrade) ────────────────────────
    location /socket.io/ {
        proxy_pass         http://chatapp_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;  # keep WebSocket connections alive
        proxy_send_timeout 3600s;
    }

    # ── REST API ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://chatapp_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Health check ──────────────────────────────────────────
    location /health {
        proxy_pass http://chatapp_backend;
    }

    # ── Optional: serve a frontend SPA ───────────────────────
    # Uncomment and set root to your built frontend folder
    # location / {
    #     root /var/www/chatapp/frontend/dist;
    #     try_files $uri $uri/ /index.html;
    # }
}
